version: '3.3'

services:
  nestar-api:
    container_name: nestar-api
    restart: always
    image: node:20.10.0
    ports:
      - 6000:3007
    volumes:
      - ./:/usr/src/nestar
    working_dir: /usr/src/nestar

    networks:
      - monorepo_network

    command: bash -c "npm install && npm run build && npm run start:prod"

  nestar-batch:
    container_name: nestar-batch
    restart: unless-stopped
    image: node:20.10.0
    ports:
      - 6001:3008
    volumes:
      - ./:/usr/src/nestar
    working_dir: /usr/src/nestar
    networks:
      - monorepo_network

    command: bash -c "npm install && npm run build && npm run start:dev:batch"

networks:
  monorepo_network:
    driver: bridge
