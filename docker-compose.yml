version: '3.3'

services:
  nestar-api:
    container_name: nestar-api
    restart: always
    image: node:20.10.0
    ports:
      - 4000:3007
      - 3006:3006

    volumes:
      - ./:/usr/src/nestar
    working_dir: /usr/src/nestar

    networks:
      - nestar_network

    command: bash -c "npm install && npm run build && npm run start:prod"

  nestar-batch:
    container_name: nestar-batch
    restart: unless-stopped
    image: node:20.10.0
    ports:
      - 4001:3008
    volumes:
      - ./:/usr/src/nestar
    working_dir: /usr/src/nestar
    networks:
      - nestar_network

    command: bash -c "npm install && npm run build && npm run start:prod:batch"

networks:
  nestar_network:
    external: true
